<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VideoSave — Download Any Video</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --purple: #7F77DD; --purple-dark: #534AB7; --purple-light: #EEEDFE;
    --teal: #1D9E75; --teal-light: #E1F5EE;
    --gray-50: #f9f9f9; --gray-100: #f0f0f0; --gray-200: #e2e2e2;
    --gray-500: #888; --gray-700: #444; --gray-900: #111;
    --red: #cc3333; --red-bg: #fff0f0;
    --green: #0F6E56; --green-bg: #edfff6;
    --radius: 10px; --radius-sm: 6px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; }
  header { background: #fff; border-bottom: 1px solid var(--gray-200); padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .logo { font-size: 16px; font-weight: 700; color: var(--purple-dark); display: flex; align-items: center; gap: 8px; }
  .header-note { font-size: 12px; color: var(--gray-500); }
  main { max-width: 700px; margin: 2.5rem auto; padding: 0 1rem 4rem; }
  .hero { text-align: center; margin-bottom: 2rem; }
  .live-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; background: var(--teal-light); color: var(--green); border: 1px solid #9FE1CB; padding: 4px 12px; border-radius: 999px; margin-bottom: 14px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
  .hero h1 { font-size: 30px; font-weight: 700; margin-bottom: 8px; letter-spacing: -.5px; }
  .hero h1 span { color: var(--purple); }
  .hero p { font-size: 14px; color: var(--gray-500); }
  .search-box { background: #fff; border: 1.5px solid var(--gray-200); border-radius: var(--radius); padding: 6px 6px 6px 14px; display: flex; gap: 8px; align-items: center; margin-bottom: 12px; transition: border-color .2s; }
  .search-box:focus-within { border-color: var(--purple); }
  .search-box input { flex: 1; border: none; outline: none; font-size: 15px; background: transparent; min-width: 0; }
  .plat-badge { display: none; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; white-space: nowrap; flex-shrink: 0; }
  .btn-primary { background: var(--purple); color: #fff; border: none; border-radius: var(--radius-sm); padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s, opacity .15s; white-space: nowrap; flex-shrink: 0; }
  .btn-primary:hover:not(:disabled) { background: var(--purple-dark); }
  .btn-primary:disabled { opacity: .45; cursor: not-allowed; }
  .platforms { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 2rem; justify-content: center; }
  .pill { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; padding: 4px 11px; border-radius: 999px; border: 1px solid transparent; }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .alert { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .alert-err { background: var(--red-bg); color: var(--red); border: 1px solid #f5c6c6; }
  .alert-ok  { background: var(--green-bg); color: var(--green); border: 1px solid #a3e6cb; }
  .reset-btn { background: none; border: none; font-size: 12px; cursor: pointer; text-decoration: underline; color: inherit; white-space: nowrap; }
  .card { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius); overflow: hidden; margin-bottom: 14px; }
  .thumb { position: relative; }
  .thumb img { width: 100%; max-height: 220px; object-fit: cover; display: block; }
  .dur { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,.75); color: #fff; font-size: 12px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
  .card-body { padding: 18px 20px; }
  .vtitle { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .vmeta { font-size: 13px; color: var(--gray-500); margin-bottom: 16px; }
  .dl-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .dl-row select { flex: 1; min-width: 150px; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 13px; background: #fff; outline: none; cursor: pointer; }
  .btn-dl { background: var(--purple); color: #fff; border: none; border-radius: var(--radius-sm); padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s, opacity .15s; white-space: nowrap; }
  .btn-dl:hover:not(:disabled) { background: var(--purple-dark); }
  .btn-dl:disabled { opacity: .45; cursor: not-allowed; }
  .prog-wrap { margin-top: 14px; }
  .prog-track { background: var(--gray-100); border-radius: 999px; height: 6px; overflow: hidden; margin-bottom: 6px; }
  .prog-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--teal)); border-radius: 999px; transition: width .3s ease; width: 0%; }
  .prog-text { font-size: 12px; color: var(--gray-500); }
  .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid #7F77DD44; border-top-color: var(--purple); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: -2px; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Playlist styles */
  .playlist-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
  .playlist-title { font-size: 16px; font-weight: 600; }
  .playlist-count { font-size: 13px; color: var(--gray-500); }
  .select-bar { display: flex; gap: 8px; align-items: center; font-size: 13px; }
  .select-bar button { background: none; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); padding: 5px 12px; font-size: 12px; cursor: pointer; color: var(--gray-700); }
  .select-bar button:hover { border-color: var(--purple); color: var(--purple); }
  .video-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; max-height: 420px; overflow-y: auto; padding-right: 4px; }
  .video-list::-webkit-scrollbar { width: 4px; }
  .video-list::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 999px; }
  .video-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); cursor: pointer; transition: border-color .15s, background .15s; background: #fff; }
  .video-item:hover { border-color: var(--purple); background: var(--purple-light); }
  .video-item.selected { border-color: var(--purple); background: var(--purple-light); }
  .video-item input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--purple); flex-shrink: 0; cursor: pointer; }
  .vi-thumb { width: 80px; height: 48px; object-fit: cover; border-radius: 4px; flex-shrink: 0; background: var(--gray-100); }
  .vi-info { flex: 1; overflow: hidden; }
  .vi-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vi-meta { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
  .vi-num { font-size: 11px; color: var(--gray-500); flex-shrink: 0; width: 24px; text-align: center; }
  .playlist-dl-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding-top: 12px; border-top: 1px solid var(--gray-100); }
  .selected-count { font-size: 13px; color: var(--gray-700); font-weight: 500; }
  footer { text-align: center; font-size: 12px; color: var(--gray-500); padding: 2rem 1rem; }
  footer a { color: var(--purple); text-decoration: none; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3m0 12l-4-4m4 4l4-4M2 17l.621 2.485A2 2 0 004.561 21h14.878a2 2 0 001.94-1.515L22 17"/></svg>
    VideoSave
  </div>
  <span class="header-note">Powered by yt-dlp · 1000+ sites</span>
</header>

<main>
  <div class="hero">
    <div style="display:flex;justify-content:center;margin-bottom:12px">
      <div class="live-badge"><span class="live-dot"></span>Connected to live backend</div>
    </div>
    <h1>Download any <span>video</span></h1>
    <p>Single videos or full playlists — YouTube, Instagram, TikTok, Facebook & more</p>
  </div>

  <div id="alert-area"></div>

  <div class="search-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="url" id="url-input" placeholder="Paste video or playlist URL…" autocomplete="off"/>
    <div class="plat-badge" id="plat-badge"></div>
    <button class="btn-primary" id="get-btn" disabled onclick="fetchInfo()">Get video</button>
  </div>

  <div class="platforms" id="platforms"></div>
  <div id="main-area"></div>
</main>

<footer>
  Built for educational purposes &nbsp;·&nbsp; Uses <a href="https://github.com/yt-dlp/yt-dlp" target="_blank">yt-dlp</a>
</footer>

<script>
const API = "https://video-downloader-backend-production-7729.up.railway.app";
const PLATFORMS = [
  { name:"YouTube",    pattern:/youtube\.com|youtu\.be/, color:"#CC0000", bg:"#fff0f0" },
  { name:"Instagram",  pattern:/instagram\.com/,          color:"#C13584", bg:"#fdf0f7" },
  { name:"TikTok",     pattern:/tiktok\.com/,             color:"#111",    bg:"#f0f0f0" },
  { name:"Facebook",   pattern:/facebook\.com|fb\.watch/, color:"#1877F2", bg:"#eef4ff" },
  { name:"Twitter/X",  pattern:/twitter\.com|x\.com/,    color:"#1DA1F2", bg:"#eef8ff" },
  { name:"Vimeo",      pattern:/vimeo\.com/,              color:"#1AB7EA", bg:"#eafaff" },
  { name:"Dailymotion",pattern:/dailymotion\.com/,        color:"#0066DC", bg:"#eef3ff" },
  { name:"Reddit",     pattern:/reddit\.com/,             color:"#FF4500", bg:"#fff3ee" },
];
const QUALITY = ["Best available","1080p","720p","480p","360p","Audio only (MP3)"];
let stage = "idle", es = null, selectedVideos = new Set(), playlistVideos = [];

const $ = id => document.getElementById(id);

$("platforms").innerHTML = PLATFORMS.map(p =>
  `<div class="pill" style="background:${p.bg};color:${p.color};border-color:${p.color}33">
    <span class="dot" style="background:${p.color}"></span>${p.name}
  </div>`).join("");

$("url-input").addEventListener("input", function(){
  const v = this.value.trim();
  $("get-btn").disabled = !v;
  const p = PLATFORMS.find(x => x.pattern.test(v));
  const b = $("plat-badge");
  if(p && v){ b.style.cssText=`display:flex;background:${p.bg};color:${p.color};border:1px solid ${p.color}44`; b.innerHTML=`<span class="dot" style="background:${p.color}"></span>${p.name}`; }
  else b.style.display="none";
  if(stage!=="idle") resetState(true);
});
$("url-input").addEventListener("keydown", e => { if(e.key==="Enter") fetchInfo(); });

function showAlert(type, msg, withReset){
  $("alert-area").innerHTML=`<div class="alert alert-${type}">${msg}${withReset?`<button class="reset-btn" onclick="resetState()">Try another</button>`:""}</div>`;
}
function clearAlert(){ $("alert-area").innerHTML=""; }

function isPlaylistUrl(url){
  return /list=|\/playlist\?|\/sets\//.test(url);
}

async function fetchInfo(){
  const url = $("url-input").value.trim();
  if(!url) return;
  clearAlert(); $("main-area").innerHTML="";
  $("get-btn").disabled=true;
  $("get-btn").innerHTML=`<span class="spinner"></span>Fetching…`;
  stage="fetching";

  // Detect if playlist
  if(isPlaylistUrl(url)){
    await fetchPlaylist(url);
  } else {
    await fetchSingle(url);
  }
  $("get-btn").disabled=false;
  $("get-btn").innerHTML="Get video";
}

async function fetchSingle(url){
  try{
    const res = await fetch(`${API}/api/info`,{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({url}), mode:"cors" });
    if(!res.ok){ const e=await res.json(); throw new Error(e.error||"Failed to fetch info"); }
    const data = await res.json();
    renderSingleCard(data, url);
    stage="ready";
  } catch(e){ showAlert("err",`⚠ ${e.message}`); stage="idle"; }
}

async function fetchPlaylist(url){
  $("main-area").innerHTML=`<div class="card"><div class="card-body" style="text-align:center;padding:2rem"><span class="spinner"></span> Loading playlist videos…</div></div>`;
  try{
    const res = await fetch(`${API}/api/playlist-info`,{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({url}), mode:"cors" });
    if(!res.ok){ const e=await res.json(); throw new Error(e.error||"Failed to fetch playlist"); }
    const data = await res.json();
    playlistVideos = data.videos;
    selectedVideos = new Set(data.videos.map((_,i)=>i));
    renderPlaylist(url);
    stage="ready";
  } catch(e){ showAlert("err",`⚠ ${e.message}`); $("main-area").innerHTML=""; stage="idle"; }
}

function renderSingleCard(info, url){
  $("main-area").innerHTML=`<div class="card">
    ${info.thumbnail?`<div class="thumb"><img src="${info.thumbnail}" alt="thumbnail">${info.duration?`<div class="dur">${info.duration}</div>`:""}</div>`:""}
    <div class="card-body">
      <div class="vtitle">${info.title||"Untitled"}</div>
      <div class="vmeta">${info.uploader||""}${info.view_count?" · "+Number(info.view_count).toLocaleString()+" views":""}</div>
      <div class="dl-row">
        <select id="quality-select">${QUALITY.map(q=>`<option>${q}</option>`).join("")}</select>
        <button class="btn-dl" id="dl-btn" onclick="startSingleDownload('${url}')">⬇ Download</button>
      </div>
      <div id="prog-wrap" style="display:none" class="prog-wrap">
        <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
        <div class="prog-text" id="prog-text">Starting…</div>
      </div>
    </div>
  </div>`;
}

function renderPlaylist(playlistUrl){
  const total = playlistVideos.length;
  $("main-area").innerHTML=`<div class="card"><div class="card-body">
    <div class="playlist-header">
      <div>
        <div class="playlist-title">📋 Playlist — ${total} videos</div>
        <div class="playlist-count">Select which videos to download</div>
      </div>
      <div class="select-bar">
        <button onclick="selectAll()">Select all</button>
        <button onclick="selectNone()">None</button>
      </div>
    </div>
    <div class="video-list" id="video-list">
      ${playlistVideos.map((v,i)=>`
        <div class="video-item selected" id="vi-${i}" onclick="toggleVideo(${i})">
          <input type="checkbox" checked id="cb-${i}" onclick="event.stopPropagation();toggleVideo(${i})"/>
          <span class="vi-num">${i+1}</span>
          ${v.thumbnail?`<img class="vi-thumb" src="${v.thumbnail}" alt="" onerror="this.style.display='none'">`:`<div class="vi-thumb"></div>`}
          <div class="vi-info">
            <div class="vi-title">${v.title}</div>
            <div class="vi-meta">${v.uploader||""}${v.duration?" · "+v.duration:""}</div>
          </div>
        </div>`).join("")}
    </div>
    <div class="playlist-dl-bar">
      <select id="quality-select" style="flex:1;min-width:140px;border:1px solid #e2e2e2;border-radius:6px;padding:9px 12px;font-size:13px;background:#fff;outline:none">
        ${QUALITY.map(q=>`<option>${q}</option>`).join("")}
      </select>
      <span class="selected-count" id="sel-count">${total} selected</span>
      <button class="btn-dl" id="dl-btn" onclick="startPlaylistDownload('${playlistUrl}')">⬇ Download ZIP</button>
    </div>
    <div id="prog-wrap" style="display:none" class="prog-wrap">
      <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
      <div class="prog-text" id="prog-text">Starting…</div>
    </div>
  </div></div>`;
}

function toggleVideo(i){
  if(selectedVideos.has(i)){ selectedVideos.delete(i); document.getElementById(`vi-${i}`).classList.remove("selected"); document.getElementById(`cb-${i}`).checked=false; }
  else { selectedVideos.add(i); document.getElementById(`vi-${i}`).classList.add("selected"); document.getElementById(`cb-${i}`).checked=true; }
  updateSelCount();
}
function selectAll(){ playlistVideos.forEach((_,i)=>{ selectedVideos.add(i); document.getElementById(`vi-${i}`).classList.add("selected"); document.getElementById(`cb-${i}`).checked=true; }); updateSelCount(); }
function selectNone(){ playlistVideos.forEach((_,i)=>{ selectedVideos.delete(i); document.getElementById(`vi-${i}`).classList.remove("selected"); document.getElementById(`cb-${i}`).checked=false; }); updateSelCount(); }
function updateSelCount(){ const el=$("sel-count"); if(el) el.textContent=`${selectedVideos.size} selected`; }

function startSingleDownload(url){
  const quality = $("quality-select").value;
  stage="downloading";
  $("dl-btn").disabled=true; $("dl-btn").innerHTML=`<span class="spinner"></span>Downloading…`;
  $("prog-wrap").style.display="block"; setProgress(0,"Connecting…"); clearAlert();
  if(es) es.close();
  es = new EventSource(`${API}/api/download?url=${encodeURIComponent(url)}&quality=${encodeURIComponent(quality)}`);
  es.onmessage = e => {
    const msg=JSON.parse(e.data);
    if(msg.type==="progress") setProgress(msg.percent,msg.text);
    else if(msg.type==="done"){
      setProgress(100,"Complete!"); stage="done";
      showAlert("ok","✓ Download complete! Your file is saving…",true);
      window.open(`${API}/api/file/${msg.filename}`,"_blank");
      $("dl-btn").disabled=false; $("dl-btn").innerHTML="⬇ Download again"; es.close();
    } else if(msg.type==="error"){
      showAlert("err",`⚠ ${msg.text}`,true); stage="ready";
      $("dl-btn").disabled=false; $("dl-btn").innerHTML="⬇ Download"; es.close();
    }
  };
  es.onerror=()=>{ showAlert("err","⚠ Connection lost.",true); stage="ready"; $("dl-btn").disabled=false; $("dl-btn").innerHTML="⬇ Download"; if(es) es.close(); };
}

function startPlaylistDownload(playlistUrl){
  if(selectedVideos.size===0){ showAlert("err","⚠ Please select at least one video."); return; }
  const quality = $("quality-select").value;
  const urls = [...selectedVideos].map(i => playlistVideos[i].url);
  stage="downloading";
  $("dl-btn").disabled=true; $("dl-btn").innerHTML=`<span class="spinner"></span>Downloading ${selectedVideos.size} videos…`;
  $("prog-wrap").style.display="block"; setProgress(0,"Starting…"); clearAlert();
  if(es) es.close();
  es = new EventSource(`${API}/api/download-playlist?urls=${encodeURIComponent(JSON.stringify(urls))}&quality=${encodeURIComponent(quality)}`);
  es.onmessage = e => {
    const msg=JSON.parse(e.data);
    if(msg.type==="progress") setProgress(msg.percent,msg.text);
    else if(msg.type==="done"){
      setProgress(100,"ZIP ready!"); stage="done";
      showAlert("ok","✓ All videos downloaded! Your ZIP is saving…",true);
      window.open(`${API}/api/file/${msg.filename}`,"_blank");
      $("dl-btn").disabled=false; $("dl-btn").innerHTML="⬇ Download again"; es.close();
    } else if(msg.type==="error"){
      showAlert("err",`⚠ ${msg.text}`,true); stage="ready";
      $("dl-btn").disabled=false; $("dl-btn").innerHTML="⬇ Download ZIP"; es.close();
    }
  };
  es.onerror=()=>{ showAlert("err","⚠ Connection lost.",true); stage="ready"; $("dl-btn").disabled=false; $("dl-btn").innerHTML="⬇ Download ZIP"; if(es) es.close(); };
}

function setProgress(pct,text){
  const f=$("prog-fill"),t=$("prog-text");
  if(f) f.style.width=Math.round(pct)+"%";
  if(t) t.textContent=text||"";
}

function resetState(soft){
  if(!soft){ $("url-input").value=""; $("plat-badge").style.display="none"; $("get-btn").disabled=true; }
  $("main-area").innerHTML=""; clearAlert(); stage="idle";
  selectedVideos=new Set(); playlistVideos=[];
  if(es){ es.close(); es=null; }
}
</script>
</body>
</html>
